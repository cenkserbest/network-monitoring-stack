route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'discord_webhook' # Default receiver

receivers:
- name: 'discord_webhook'
  discord_configs:
  # To test this, create a Discord Server, go to Channel Settings -> Integrations -> Webhooks, and paste the URL below.
  # For now, it's a dummy URL.
  - webhook_url: 'https://discord.com/api/webhooks/your-webhook-id/your-webhook-token'
    send_resolved: true

- name: 'slack_webhook'
  slack_configs:
  - api_url: 'http://example.com/dummy-slack-webhook-url-replace-me'
    channel: '#alerts'
    send_resolved: true

- name: 'email_alerts'
  email_configs:
  - to: 'admin@yourdomain.com'
    from: 'alertmanager@yourdomain.com'
    smarthost: 'smtp.gmail.com:587'
    auth_username: 'your-email@gmail.com'
    auth_identity: 'your-email@gmail.com'
    auth_password: 'your-app-password'
    send_resolved: true
